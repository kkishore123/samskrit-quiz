<!DOCTYPE html>
<html lang="sa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>संस्कृत-व्याकरण-प्रश्नोत्तरी</title>
    <style>
        :root {
            --primary: #8e44ad; --primary-hover: #732d91;
            --bg: #f8f9fa; --card-bg: #ffffff; --text: #2c3e50;
            --success: #27ae60; --danger: #c0392b;
            --hint-bg: #eef2f7; --hint-text: #475569;
        }
        body {
            font-family: 'Segoe UI', sans-serif; background: var(--bg);
            color: var(--text); margin: 0; padding: 20px;
            display: flex; justify-content: center;
        }
        .quiz-container {
            max-width: 650px; width: 100%; background: var(--card-bg);
            padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 { text-align: center; color: var(--primary); margin-bottom: 30px; }
        .progress { font-size: 0.9rem; color: #7f8c8d; text-align: right; margin-bottom: 10px; }
        .topic-tag { display: inline-block; background: #f1f2f6; color: var(--primary); padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; margin-bottom: 15px; }
        .question { font-size: 1.3rem; font-weight: 600; margin-bottom: 20px; line-height: 1.5; }
        .options-list { list-style: none; padding: 0; margin-bottom: 20px; }
        .option-item { background: var(--bg); border: 2px solid #e2e8f0; padding: 14px 20px; margin-bottom: 12px; border-radius: 8px; cursor: pointer; font-size: 1.1rem; transition: all 0.2s; }
        .option-item:hover { border-color: var(--primary); background: #fbf7fc; }
        .option-item.correct { background: #d4edda; border-color: var(--success); color: #155724; }
        .option-item.incorrect { background: #f8d7da; border-color: var(--danger); color: #721c24; }
        .option-item.disabled { pointer-events: none; }
        .hint-btn { background: none; border: 1px solid #cbd5e1; color: var(--hint-text); padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        .hint-box { display: none; background: var(--hint-bg); color: var(--hint-text); padding: 15px; border-radius: 8px; margin-top: 15px; border-left: 4px solid var(--primary); }
        .feedback-box { margin-top: 20px; padding: 15px; border-radius: 8px; font-weight: 500; display: none; }
        .feedback-box.correct { display: block; background: #d4edda; color: #155724; }
        .feedback-box.incorrect { display: block; background: #f8d7da; color: #721c24; }
        .action-container { display: flex; justify-content: space-between; margin-top: 25px; padding-top: 20px; border-top: 2px solid var(--bg); }
        .next-btn, .restart-btn { background: var(--primary); color: white; border: none; padding: 10px 24px; border-radius: 6px; cursor: pointer; }
        .next-btn:hover, .restart-btn:hover { background: var(--primary-hover); }
        .result-screen { text-align: center; display: none; }
        .result-score { font-size: 3rem; font-weight: bold; color: var(--primary); margin: 20px 0; }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="quiz-screen">
        <h1 id="quiz-title">संस्कृत-व्याकरण-प्रश्नोत्तरी</h1>
        <div class="progress" id="progress-text">प्रश्न संख्या: 1 / 10</div>
        <div class="topic-tag" id="topic-text">विषयः</div>
        <div class="question" id="question-text">प्रश्नः</div>
        <ul class="options-list" id="options-container"></ul>
        <button class="hint-btn" onclick="toggleHint()">सङ्केतः (Hint)</button>
        <div class="hint-box" id="hint-container"></div>
        <div class="feedback-box" id="feedback-container"></div>
        <div class="action-container">
            <div></div>
            <button class="next-btn" id="next-button" style="display:none;" onclick="nextQuestion()">अग्रिमप्रश्नः (Next)</button>
        </div>
    </div>

    <div class="result-screen" id="result-screen">
        <h1>प्रश्नोत्तरी समाप्ता</h1>
        <p>भवतः/भवत्याः अङ्काः (Your Score):</p>
        <div class="result-score" id="score-text">0 / 10</div>
        <p id="result-evaluation">उत्तमं प्रयासम्!</p>
        <button class="restart-btn" onclick="restartQuiz()">पुनः आरम्भः करोतु (Restart)</button>
    </div>
</div>

<script src="quiz-data.js"></script>
<script>
    let currentQuestionIndex = 0, score = 0;

    function initQuiz() {
        if (typeof quizData !== 'undefined' && quizData.quizTitle) {
            document.getElementById('quiz-title').innerText = quizData.quizTitle;
            loadQuestion();
        } else {
            document.getElementById('question-text').innerText = "त्रुटिः: 'quiz-data.js' न मिलितम्। (Error: quiz-data.js missing)";
        }
    }

    function loadQuestion() {
        const q = quizData.questions[currentQuestionIndex];
        document.getElementById('progress-text').innerText = `प्रश्न संख्या: ${currentQuestionIndex + 1} / ${quizData.questions.length}`;
        document.getElementById('topic-text').innerText = q.topic;
        document.getElementById('question-text').innerText = q.questionText;
        document.getElementById('hint-container').style.display = 'none';
        
        const fb = document.getElementById('feedback-container');
        fb.className = 'feedback-box'; fb.style.display = 'none';
        document.getElementById('next-button').style.display = 'none';

        const container = document.getElementById('options-container');
        container.innerHTML = '';

        q.options.forEach((opt) => {
            const li = document.createElement('li');
            li.className = 'option-item'; li.innerText = opt.text;
            li.onclick = () => selectOption(li, opt);
            container.appendChild(li);
        });
    }

    function selectOption(el, opt) {
        const items = document.querySelectorAll('.option-item');
        const fb = document.getElementById('feedback-container');
        items.forEach(item => item.classList.add('disabled'));

        if (opt.isCorrect) {
            el.classList.add('correct'); fb.innerText = opt.reason;
            fb.className = 'feedback-box correct'; score++;
        } else {
            el.classList.add('incorrect'); fb.innerText = opt.reason;
            fb.className = 'feedback-box incorrect';
            items.forEach((item, idx) => {
                if (quizData.questions[currentQuestionIndex].options[idx].isCorrect) item.classList.add('correct');
            });
        }
        document.getElementById('next-button').style.display = 'block';
    }

    function toggleHint() {
        const box = document.getElementById('hint-container');
        box.innerText = quizData.questions[currentQuestionIndex].hint;
        box.style.display = (box.style.display === 'none' || box.style.display === '') ? 'block' : 'none';
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < quizData.questions.length) loadQuestion(); else showResults();
    }

    function showResults() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('score-text').innerText = `${score} / ${quizData.questions.length}`;
        const pct = (score / quizData.questions.length) * 100;
        document.getElementById('result-evaluation').innerText = pct === 100 ? "अतिउत्तमम्! सर्वं शुद्धम्!" : pct >= 70 ? "उत्तमं प्रयासम्!" : "पुनः अभ्यासं करोतु।";
    }

    function restartQuiz() {
        currentQuestionIndex = 0; score = 0;
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        loadQuestion();
    }

    window.addEventListener('DOMContentLoaded', initQuiz);
</script>
</body>
</html>
