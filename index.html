<!DOCTYPE html>
<html lang="sa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>संस्कृत-व्याकरण-प्रश्नोत्तरी</title>
    <style>
        :root {
            --primary: #8e44ad;
            --primary-hover: #732d91;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text: #2c3e50;
            --success: #27ae60;
            --danger: #c0392b;
            --hint-bg: #eef2f7;
            --hint-text: #475569;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .quiz-container {
            max-width: 650px;
            width: 100%;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        h1 {
            text-align: center;
            color: var(--primary);
            font-size: 1.8rem;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--bg);
            padding-bottom: 15px;
        }

        .progress {
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-bottom: 10px;
            text-align: right;
        }

        .topic-tag {
            display: inline-block;
            background: #f1f2f6;
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .question {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .options-list {
            list-style: none;
            padding: 0;
            margin: 0 0 20px 0;
        }

        .option-item {
            background: var(--bg);
            border: 2px solid #e2e8f0;
            padding: 14px 20px;
            margin-bottom: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.2s ease;
        }

        .option-item:hover {
            border-color: var(--primary);
            background: #fbf7fc;
        }

        .option-item.correct {
            background-color: #d4edda;
            border-color: var(--success);
            color: #155724;
        }

        .option-item.incorrect {
            background-color: #f8d7da;
            border-color: var(--danger);
            color: #721c24;
        }

        .option-item.disabled {
            pointer-events: none;
        }

        .hint-btn {
            background: none;
            border: 1px solid #cbd5e1;
            color: var(--hint-text);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .hint-btn:hover {
            background: #e2e8f0;
        }

        .hint-box {
            display: none;
            background: var(--hint-bg);
            color: var(--hint-text);
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.95rem;
            border-left: 4px solid var(--primary);
            line-height: 1.4;
        }

        .feedback-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-weight: 500;
            display: none;
            line-height: 1.4;
        }

        .feedback-box.correct {
            display: block;
            background: #d4edda;
            color: #155724;
        }

        .feedback-box.incorrect {
            display: block;
            background: #f8d7da;
            color: #721c24;
        }

        .action-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 2px solid var(--bg);
        }

        .next-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            display: none;
        }

        .next-btn:hover {
            background: var(--primary-hover);
        }

        .result-screen {
            text-align: center;
            display: none;
        }

        .result-score {
            font-size: 3rem;
            font-weight: bold;
            color: var(--primary);
            margin: 20px 0;
        }

        .restart-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="quiz-screen">
        <h1 id="quiz-title">संस्कृत-व्याकरण-प्रश्नोत्तरी</h1>
        <div class="progress" id="progress-text">प्रश्न संख्या: 1 / 10</div>
        
        <div class="topic-tag" id="topic-text">विषयः</div>
        <div class="question" id="question-text">प्रश्नः</div>
        
        <ul class="options-list" id="options-container">
            <!-- Dynamic Options -->
        </ul>

        <button class="hint-btn" id="hint-button" onclick="toggleHint()">सङ्केतः (Hint)</button>
        <div class="hint-box" id="hint-container">सङ्केत विवरणी...</div>

        <div class="feedback-box" id="feedback-container"></div>

        <div class="action-container">
            <div></div> <!-- Spacer -->
            <button class="next-btn" id="next-button" onclick="nextQuestion()">अग्रिमप्रश्नः (Next)</button>
        </div>
    </div>

    <div class="result-screen" id="result-screen">
        <h1>प्रश्नोत्तरी समाप्ता</h1>
        <p>भवतः/भवत्याः अङ्काः (Your Score):</p>
        <div class="result-score" id="score-text">0 / 10</div>
        <p id="result-evaluation">उत्तमं प्रयासम्!</p>
        <button class="restart-btn" onclick="restartQuiz()">पुनः आरम्भः करोतु (Restart)</button>
    </div>
</div>
