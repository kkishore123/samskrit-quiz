<!DOCTYPE html>
<html lang="sa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>संस्कृत-प्रश्नोत्तरी</title>
    <style>
        :root {
            --primary: #8e44ad; --hover: #732d91; --bg: #f8f9fa; --card: #ffffff;
            --text: #2c3e50; --success: #27ae60; --danger: #c0392b; --hint: #eef2f7;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; }
        .quiz-container { max-width: 600px; width: 100%; background: var(--card); padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: var(--primary); margin: 0 0 20px 0; }
        
        .setup-section { background: #f1f2f6; padding: 20px; border-radius: 8px; margin-bottom: 10px; text-align: center; }
        .setup-title { font-weight: bold; margin-bottom: 15px; font-size: 1.1rem; color: var(--primary); }
        .filter-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; margin-bottom: 20px; text-align: left; }
        .filter-item { display: flex; align-items: center; font-size: 1rem; cursor: pointer; }
        .filter-item input { margin-right: 8px; transform: scale(1.1); cursor: pointer; }
        
        .progress { font-size: 0.9rem; color: #7f8c8d; text-align: right; margin-bottom: 10px; }
        .tag { display: inline-block; background: #eef2f7; color: var(--primary); padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; margin-bottom: 15px; }
        .question { font-size: 1.25rem; font-weight: 600; margin-bottom: 20px; line-height: 1.5; text-align: left; }
        .options { list-style: none; padding: 0; margin-bottom: 20px; text-align: left; }
        .item { background: var(--bg); border: 2px solid #e2e8f0; padding: 12px 18px; margin-bottom: 10px; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .item:hover { border-color: var(--primary); background: #fbf7fc; }
        .item.correct { background: #d4edda; border-color: var(--success); color: #155724; }
        .item.incorrect { background: #f8d7da; border-color: var(--danger); color: #721c24; }
        .item.disabled { pointer-events: none; }
        
        .btn { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: background 0.2s; }
        .btn:hover { background: var(--hover); }
        .btn-hint { background: none; border: 1px solid #cbd5e1; color: #475569; padding: 6px 14px; border-radius: 6px; cursor: pointer; display: inline-block; margin-bottom: 10px; }
        
        .btn-break { background: #e74c3c !important; color: white !important; margin-right: auto; }
        .btn-break:hover { background: #c0392b !important; }
        
        .box { display: none; background: var(--hint); padding: 15px; border-radius: 8px; margin-top: 15px; border-left: 4px solid var(--primary); text-align: left; }
        .fb { margin-top: 15px; padding: 12px; border-radius: 8px; font-weight: 500; display: none; text-align: left; }
        .fb.correct { display: block; background: #d4edda; color: #155724; }
        .fb.incorrect { display: block; background: #f8d7da; color: #721c24; }
        .actions { display: flex; justify-content: space-between; margin-top: 20px; padding-top: 15px; border-top: 2px solid var(--bg); align-items: center; }
        .screen { display: none; text-align: center; }
        .score { font-size: 3rem; font-weight: bold; color: var(--primary); margin: 15px 0; }
        .group { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .card { background: #fff; border: 1px solid #e2e8f0; border-left: 5px solid var(--danger); text-align: left; padding: 12px; margin-bottom: 10px; border-radius: 6px; }
        .card.clear { border-left-color: var(--success); text-align: center; font-size: 1.1rem; background: #f4fbf7; }
        #error-msg { color: var(--danger); font-weight: bold; margin-top: 10px; display: none; }
    </style>
</head>
<body>
<div class="quiz-container">
    <h1>संस्कृत-व्याकरण-प्रश्नोत्तरी</h1>

    <!-- Screen 1: Dashboard Configuration Selection Panel -->
    <div class="setup-section" id="setup-screen">
        <div class="setup-title">अभ्यासार्थं शब्दान् चिन्वन्तु (Choose Words to Practice):</div>
        <div class="filter-grid">
            <label class="filter-item"><input type="checkbox" value="राम" checked> रामः</label>
            <label class="filter-item"><input type="checkbox" value="देव" checked> देवः</label>
            <label class="filter-item"><input type="checkbox" value="नदी" checked> नदी</label>
            <label class="filter-item"><input type="checkbox" value="लता" checked> लता</label>
            <label class="filter-item"><input type="checkbox" value="माला" checked> माला</label>
            <label class="filter-item"><input type="checkbox" value="वन" checked> वनम्</label>
            <label class="filter-item"><input type="checkbox" value="फल" checked> फलम्</label>
            <label class="filter-item"><input type="checkbox" value="तद्" checked> तद् (सः/सा)</label>
            <label class="filter-item"><input type="checkbox" value="एतद्" checked> एतद् (एषः)</label>
            <label class="filter-item"><input type="checkbox" value="किम्" checked> किम् (कः/का)</label>
        </div>
        <button class="btn" onclick="generateCustomQuiz()">प्रश्नोत्तरी आरभ्यताम् (Start Quiz)</button>
        <div id="error-msg">कृपया न्यूनतिन्यूनं एकं विकल्पं चिन्वन्तु!</div>
    </div>

    <!-- Screen 2: Dynamic Question Runner Panel -->
    <div class="screen" id="quiz-screen">
        <div class="progress" id="p-text">प्रश्न संख्या: 1 / 10</div>
        <div class="tag" id="t-text">विषयः</div>
        <div class="question" id="q-text">प्रश्नः</div>
        <ul class="options" id="o-box"></ul>
        <div style="text-align: left;"><button class="btn-hint" onclick="toggleHint()">सङ्केतः (Hint)</button></div>
        <div class="box" id="h-box"></div>
        <div class="fb" id="f-box"></div>
        <div class="actions">
            <button class="btn btn-break" onclick="backToSetup()">विरामः (Break)</button>
            <button class="btn" id="n-btn" style="display:none;" onclick="nextQ()">अग्रिमप्रश्नः</button>
        </div>
    </div>
    <!-- Screen 3: Final Scoreboard Panel -->
    <div class="screen" id="res-screen">
        <h2>प्रश्नोत्तरी समाप्ता</h2>
        <p>भवतः/भवत्याः अङ्काः (Your Score):</p>
        <div class="score" id="s-text">0 / 10</div>
        <p id="eval-text">उत्तमं प्रयासम्!</p>
        <div class="group">
            <button class="btn" onclick="showReview()">त्रुटीन् पश्यन्तु (Revise Mistakes)</button>
            <button class="btn" onclick="backToSetup()">नूतन-नियमैः सह पुनः खेलतु (New Selection)</button>
        </div>
    </div>

    <!-- Screen 4: Revision Panel -->
    <div class="screen" id="rev-screen">
        <h2>त्रुटि-संशोधनम् (Revision)</h2>
        <div id="rev-list"></div>
        <div class="group"><button class="btn" onclick="hideReview()">परिणाम-फलकम् प्रति गच्छतु</button></div>
    </div>
</div>

<script src="quiz-nouns.js"></script>
<script src="quiz-pronouns.js"></script>
<script>
    let masterQuestions = [], filteredQuestions = [], active = [], idx = 0, score = 0, mistakes = [];
    
    function initQuiz() {
        masterQuestions = [];
        const sources = ['nounQuestions', 'pronounQuestions', 'db', 'quizData'];
        sources.forEach(v => {
            if (window[v]) {
                let items = Array.isArray(window[v]) ? window[v] : (window[v].questions || []);
                masterQuestions = masterQuestions.concat(items);
            }
        });
        if (masterQuestions.length === 0) {
            document.getElementById('setup-screen').innerHTML = "<div style='color:var(--danger); font-weight:bold;'>त्रुटिः: डेटा-सञ्चिका न मिलिता। कृपया सञ्चिकाः पश्यन्तु।</div>";
        }
    }

    function generateCustomQuiz() {
        const checkboxes = document.querySelectorAll('.filter-grid input[type="checkbox"]');
        let selectedValues = [];
        checkboxes.forEach(cb => { if (cb.checked) selectedValues.push(cb.value); });

        if (selectedValues.length === 0) {
            document.getElementById('error-msg').style.display = 'block';
            return;
        }
        document.getElementById('error-msg').style.display = 'none';

        // Bulletproof separation matching exact topic bounds
        filteredQuestions = masterQuestions.filter(q => {
            const topicText = q.topic || q.t || "";
            
            return selectedValues.some(val => {
                if (val === "तद्") return topicText.includes("तच्छब्दः");
                if (val === "एतद्") return topicText.includes("एतच्छब्दः");
                if (val === "किम्") return topicText.includes("किम्शब्दः");
                
                return topicText.startsWith("अकार") || topicText.startsWith("आकार") || topicText.startsWith("ईकार") 
                    ? topicText.includes(val) 
                    : false;
            });
        });

        // Fisher-Yates Scrambler shuffling the entire array before carving the slice
        for (let i = filteredQuestions.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [filteredQuestions[i], filteredQuestions[j]] = [filteredQuestions[j], filteredQuestions[i]];
        }

        active = filteredQuestions.slice(0, Math.min(10, filteredQuestions.length));
        idx = 0; score = 0; mistakes = [];
        
        // Force rewrite the scoreboard visuals back to an empty template right now
        document.getElementById('res-screen').style.display = 'none';
        document.getElementById('rev-screen').style.display = 'none';
        document.getElementById('s-text').innerText = "";
        document.getElementById('eval-text').innerText = "";

        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        loadQ();
    }

    function loadQ() {
        const q = active[idx];
        document.getElementById('p-text').innerText = `प्रश्न संख्या: ${idx + 1} / ${active.length}`;
        document.getElementById('t-text').innerText = q.topic || q.t || "विषयः";
        document.getElementById('q-text').innerText = q.questionText || q.q || "";
        document.getElementById('h-box').style.display = 'none';
        const f = document.getElementById('f-box'); f.className = 'fb'; f.style.display = 'none';
        document.getElementById('n-btn').style.display = 'none';
        const box = document.getElementById('o-box'); box.innerHTML = '';
        const opts = q.options || q.o || [];
        opts.forEach((opt) => {
            const li = document.createElement('li'); li.className = 'item'; li.innerText = opt.text || opt.t || "";
            li.onclick = () => select(li, opt); box.appendChild(li);
        });
    }

    function select(el, opt) {
        const items = document.querySelectorAll('.item'); const f = document.getElementById('f-box'); const q = active[idx];
        items.forEach(i => i.classList.add('disabled'));
        const isCorrect = opt.isCorrect !== undefined ? opt.isCorrect : opt.c;
        const reason = opt.reason || opt.r || ""; const opts = q.options || q.o || [];
        if (isCorrect) { el.classList.add('correct'); f.innerText = reason; f.className = 'fb correct'; score++; }
        else {
            el.classList.add('incorrect'); f.innerText = reason; f.className = 'fb incorrect';
            items.forEach((item, i) => { if (opts[i].isCorrect || opts[i].c) item.classList.add('correct'); });
            const correctOpt = opts.find(o => o.isCorrect || o.c) || {};
            mistakes.push({ t: q.topic || q.t || "विषयः", q: q.questionText || q.q || "", chosen: opt.text || opt.t || "", correct: correctOpt.text || correctOpt.t || "", r: reason });
        }
        document.getElementById('n-btn').style.display = 'block';
    }

    function toggleHint() {
        const box = document.getElementById('h-box'); const q = active[idx];
        box.innerText = q.hint || q.h || "सङ्केतः नास्ति।";
        box.style.display = (box.style.display === 'none' || box.style.display === '') ? 'block' : 'none';
    }

    function nextQ() { idx++; if (idx < active.length) loadQ(); else showResults(); }
    function showResults() {
        document.getElementById('quiz-screen').style.display = 'none'; document.getElementById('res-screen').style.display = 'block';
        document.getElementById('s-text').innerText = `${score} / ${active.length}`;
        const pct = (score / active.length) * 100;
        document.getElementById('eval-text').innerText = pct === 100 ? "अतिउत्तमम्! सर्वं शुद्धम्!" : pct >= 70 ? "उत्तमं प्रयासम्!" : "पुनः अभ्यासं करोतु।";
    }
    function showReview() {
        document.getElementById('res-screen').style.display = 'none'; const container = document.getElementById('rev-list'); container.innerHTML = '';
        if (mistakes.length === 0) container.innerHTML = '<div class="card clear">✨ भवतः/भवत्याः कापि त्रुटिः नास्ति! सर्वं शुद्धम्!</div>';
        else {
            mistakes.forEach(m => {
                const div = document.createElement('div'); div.className = 'card';
                div.innerHTML = `<strong>विषयः:</strong> ${m.t}<br><strong>प्रश्नः:</strong> ${m.q}<br><span style="color:var(--danger)"><strong>भवतः उत्तरम्:</strong> ${m.chosen}</span><br><span style="color:var(--success)"><strong>शुद्धम् उत्तरम्:</strong> ${m.correct}</span><br><small style="color:#7f8c8d"><strong>विवरणम्:</strong> ${m.r}</small>`;
                container.appendChild(div);
            });
        }
        document.getElementById('rev-screen').style.display = 'block';
    }
    function hideReview() { document.getElementById('rev-screen').style.display = 'none'; document.getElementById('res-screen').style.display = 'block'; }
    function backToSetup() { 
        idx = 0; score = 0; mistakes = []; active = [];
        document.getElementById('quiz-screen').style.display = 'none'; 
        document.getElementById('res-screen').style.display = 'none'; 
        document.getElementById('rev-screen').style.display = 'none'; 
        document.getElementById('setup-screen').style.display = 'block'; 
    }
    window.addEventListener('DOMContentLoaded', initQuiz);
</script>
</body>
</html>
